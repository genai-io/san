name: Release Bot

# Automatically creates a release PR (version bump + CHANGELOG) on a
# weekly schedule, or on demand via workflow_dispatch.
#
# The resulting PR follows the same pattern as
# https://github.com/genai-io/san/pull/377 — a `release/vX.Y.Z` branch
# targeting `main` with two changed files:
#   - CHANGELOG.md      (new version section)
#   - cmd/san/main.go   (version string bumped)
#
# After the PR is merged, pushing the tag triggers
# .github/workflows/release.yml to build and publish.

on:
  schedule:
    # Every Monday at 9:05 AM UTC (off-peak, avoids the :00 / :30 spike).
    - cron: '5 9 * * 1'
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
      dry_run:
        description: Preview changes without creating a PR
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@7eab6e2c2a5ff3d41e7e4953b5e16818b347d86f # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_BUMP: ${{ inputs.version_bump || 'patch' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python3 .github/scripts/release-bot.py
