name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.8'
          cache: true
      - name: Install format tools
        run: make install-format-tools
      - name: Format check
        run: make format-check
      - name: Build
        run: make build-all
      - name: Unit + integration tests (merged coverage)
        run: make cover
      - name: Vet
        run: make lint

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.8'
          cache: true
      - name: Build
        run: go build ./cmd/san/
      - name: Test
        run: go test -count=1 ./...
      - name: Smoke test — zip package
        shell: bash
        run: |
          GOOS=windows GOARCH=amd64 go build -o san.exe ./cmd/san/
          zip san_windows_amd64.zip san.exe
          rm san.exe
          unzip -l san_windows_amd64.zip | grep 'san.exe'
          unzip san_windows_amd64.zip
          ./san.exe version
